{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Edit Customer</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
class="form-control"
name="name"
value="{{ customer.name }}"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
value="{{ customer.email }}"
required>

</div>

<div class="mb-3">

<label>Balance</label>

<input
type="number"
step="0.01"
class="form-control"
name="balance"
value="{{ customer.balance }}"
required>
</div>

<button
class="btn btn-primary">

Save Customer

</button>

</form>

</div>

{% endblock %}
