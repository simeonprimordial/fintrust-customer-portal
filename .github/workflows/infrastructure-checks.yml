name: Infrastructure Checks

on:
  pull_request:
    paths:
      - "terraform/**"
      - "app/config.py"
      - ".github/workflows/infrastructure-checks.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "app/config.py"
      - ".github/workflows/infrastructure-checks.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate infrastructure code
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Check Terraform formatting
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform -chdir=terraform init -backend=false

      - name: Validate Terraform
        id: terraform_validate
        continue-on-error: true
        run: |
          set +e
          terraform -chdir=terraform validate -no-color > terraform-validation.txt 2>&1
          status=$?
          cat terraform-validation.txt
          exit "$status"

      - name: Upload Terraform validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-validation
          path: terraform-validation.txt
          if-no-files-found: error
          retention-days: 1

      - name: Validate bootstrap Bash syntax
        if: always()
        run: bash -n terraform/userdata.sh

      - name: Validate Python configuration syntax
        if: always()
        run: python -m py_compile app/config.py

      - name: Fail when Terraform validation failed
        if: steps.terraform_validate.outcome == 'failure'
        run: exit 1
