name: Infrastructure Checks

on:
  pull_request:
    paths:
      - "terraform/**"
      - "app/config.py"
      - ".github/workflows/infrastructure-checks.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "app/config.py"
      - ".github/workflows/infrastructure-checks.yml"

permissions:
  contents: read

jobs:
  validate:
    name: Validate infrastructure code
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Check Terraform formatting
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform -chdir=terraform init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=terraform validate

      - name: Validate bootstrap Bash syntax
        run: bash -n terraform/userdata.sh

      - name: Validate Python configuration syntax
        run: python -m py_compile app/config.py
